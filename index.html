<title>Микронаушники Владикавказ | mikro_15</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--card:#12121a;--accent:#00e5ff;--accent2:#7c4dff;--text:#e8e8f0;--dim:#8888a0;--border:rgba(255,255,255,0.06)}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;
  background-image:radial-gradient(ellipse at 30% 20%,rgba(0,229,255,0.05) 0%,transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(124,77,255,0.04) 0%,transparent 50%)}
.c{max-width:420px;margin:0 auto;padding:12px 16px 16px}
.logo{width:160px;margin:0 auto 4px;display:block}
.logo img{width:100%;display:block}
.city{text-align:center;font-size:12px;color:var(--dim);margin-bottom:10px}
.links{display:flex;flex-direction:column;gap:6px;margin-bottom:6px}
a.b{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:12px;text-decoration:none;color:var(--text);font-weight:600;font-size:14px;transition:all .2s;cursor:pointer}
a.b:hover{transform:translateY(-1px);border-color:rgba(0,229,255,0.3);box-shadow:0 4px 20px rgba(0,0,0,0.3)}
a.b.cta{background:linear-gradient(135deg,rgba(0,229,255,0.1),rgba(124,77,255,0.07));border-color:rgba(0,229,255,0.2)}
a.b.cta .t{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.i{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.i svg{width:16px;height:16px;fill:#fff}
.t{font-size:13px;font-weight:700;flex:1}
.d{font-size:11px;color:var(--dim);font-weight:400}
.arr{width:16px;height:16px;fill:var(--dim);flex-shrink:0}
.iq{background:linear-gradient(135deg,#7c4dff,#651fff)}
.is{background:linear-gradient(135deg,#00e5ff,#0091ea)}
.iw{background:linear-gradient(135deg,#25D366,#128C7E)}
.it{background:linear-gradient(135deg,#2AABEE,#229ED9)}
.ip{background:linear-gradient(135deg,#FF6D00,#FF3D00)}
.ii{background:linear-gradient(135deg,#26c6da,#00acc1)}
.im{background:linear-gradient(135deg,#FFD600,#FF9100)}
.foot{text-align:center;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-size:11px;color:var(--dim)}
.foot .hrs{display:flex;align-items:center;justify-content:center;gap:5px;margin-bottom:4px}
.dot{width:6px;height:6px;border-radius:50%;background:#00e676;box-shadow:0 0 6px rgba(0,230,118,0.5);animation:bl 2s infinite}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.4}}
.foot span{font-family:'Oswald',sans-serif;color:var(--accent);letter-spacing:1px}
</style>
</head>
